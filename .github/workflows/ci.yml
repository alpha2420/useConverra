name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci || npm install
      
    - name: Type Check
      run: npx tsc --noEmit
      
    - name: Lint Code
      run: npm run lint
      
    # Note: To run the AI test suite in GitHub Actions, you must add your API keys as Secrets in your GitHub repository settings.
    # Go to Settings > Secrets and variables > Actions > New repository secret
    # Add: GEMINI_API_KEY, OPENAI_API_KEY, MONGODB_URL
    - name: Run AI Tests
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        MONGODB_URL: ${{ secrets.MONGODB_URL }}
      run: npm run test:ai
